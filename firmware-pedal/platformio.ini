; DriveLab Firmware — Pedaleira
; Alvo: Raspberry Pi Pico (RP2040). Core arduino-pico (Earle Philhower) via PlatformIO.
; Marco atual: M0 (bring-up: blink + serial USB). SEM HID, SEM sensores.
; Design: ../docs/superpowers/specs/2026-07-14-pedal-firmware-rp2040-design.md

[env:pico]
; Plataforma community que traz o core do Philhower (arduino-pico) com TinyUSB.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; --- Serial monitor (USB CDC) ---
monitor_speed = 115200

; --- Gravação ---
; Padrão: UF2 pelo bootloader (segure BOOTSEL ao plugar; aparece a unidade RPI-RP2).
; O PlatformIO copia o .uf2 automaticamente. Alternativa: picotool.
; upload_protocol = picotool
