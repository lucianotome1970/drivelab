; DriveLab Firmware — Volante removível (rim)
; Alvo: Waveshare RP2040-Zero (RP2040, USB-C). Core arduino-pico (Philhower) via PlatformIO.
; Gamepad HID + P0 + LEDs WS2812 + flash. Escrito sem placa — validar na bancada.
; Design: notas internas de projeto (não versionadas)
; Obs.: ADC A0/A1 = GP26/27. WS2812 (10 botões + barra) em GP28. Botões lentos em 2× MCP23017 (I2C GP0/GP1).

[env:rp2040_zero]
; Plataforma community que traz o core do Philhower (arduino-pico) com TinyUSB.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
framework = arduino
board_build.core = earlephilhower

; --- USB: Adafruit TinyUSB (necessário para HID custom / gamepad) ---
build_flags = -DUSE_TINYUSB

; --- Bibliotecas ---
; NeoPixel (WS2812) para os LEDs RGB. MCP23017 (I2C) p/ os botões lentos (2 chips = 32 entradas
; em 2 pinos). EEPROM (flash) já vem no core do arduino-pico; Wire (I2C) também.
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

; --- Identidade USB: aparece no Windows como "DriveLab Wheel" ---
; (VID/PID de teste do pid.codes; base = 0x0001, pedaleira = 0x0002, freio de mão = 0x0003, rim = 0x0004)
board_build.arduino.earlephilhower.usb_manufacturer = DriveLab
board_build.arduino.earlephilhower.usb_product = DriveLab Wheel
board_build.arduino.earlephilhower.usb_vid = 0x1209
board_build.arduino.earlephilhower.usb_pid = 0x0004

; --- Serial monitor (USB CDC, coexiste com o HID) ---
monitor_speed = 115200

; --- Gravação ---
; Segure BOOTSEL ao plugar (aparece a unidade RPI-RP2); o PlatformIO copia o .uf2.
; upload_protocol = picotool

; ==========================================================================
; Alvo alternativo: Raspberry Pi Pico (H) + Waveshare Expansion Shield Base.
; Mesma firmware, só muda a placa e a PINAGEM (flag BOARD_PICO_SHIELD, ver
; main.cpp): I2C0 nos conectores dedicados GP8/GP9 (1 MCP em cada), encoders
; em GP10..19, pás no ADC GP26/27, WS2812 em GP28 (5V da fita pelo header Vusb).
; Zero-solda com um Pico H. `extends` herda tudo do rp2040_zero (USB/libs/etc.).
; Compilar: pio run -e pico
; ==========================================================================
[env:pico]
extends = env:rp2040_zero
board = rpipico
build_flags = -DUSE_TINYUSB -DBOARD_PICO_SHIELD
