; DriveLab Firmware — Freio de mão
; Alvo: Waveshare RP2040-Zero (RP2040, USB-C). Core arduino-pico (Philhower) via PlatformIO.
; Marco atual: M5 (HID Joystick 1 eixo+botão + P0 + load cell HX711 + flash). Escrito sem placa — validar na bancada.
; Design: notas internas de projeto (não versionadas)
; Obs.: ADC A0/A1/A2 = GP26/27/28 (igual ao Pico). LED onboard é WS2812 (GP16), não simples.

[env:rp2040_zero]
; Plataforma community que traz o core do Philhower (arduino-pico) com TinyUSB.
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = waveshare_rp2040_zero
framework = arduino
board_build.core = earlephilhower

; --- USB: Adafruit TinyUSB (necessário para HID custom / joystick) ---
build_flags = -DUSE_TINYUSB

; --- Bibliotecas ---
; HX711 (load cell). EEPROM (flash) já vem no core do arduino-pico.
lib_deps = bogde/HX711@^0.7.5

; --- Identidade USB: aparece no Windows como "DriveLab Handbrake" ---
; (VID/PID de teste do pid.codes; pedaleira = 0x0002, volante = 0x0001, freio de mão = 0x0003)
board_build.arduino.earlephilhower.usb_manufacturer = DriveLab
board_build.arduino.earlephilhower.usb_product = DriveLab Handbrake
board_build.arduino.earlephilhower.usb_vid = 0x1209
board_build.arduino.earlephilhower.usb_pid = 0x0003

; --- Serial monitor (USB CDC, coexiste com o HID) ---
monitor_speed = 115200

; --- Gravação ---
; Segure BOOTSEL ao plugar (aparece a unidade RPI-RP2); o PlatformIO copia o .uf2.
; upload_protocol = picotool
