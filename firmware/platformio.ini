; DriveLab Firmware — Trilho B
; Alvo: ODESC v4.2 (STM32F405RGT6). Framework Arduino (STM32duino).
; Marco atual: M0 (bring-up: toolchain + gravação + serial USB). SEM motor.

[env:odesc_f405]
platform = ststm32
board = genericSTM32F405RG
framework = arduino

; --- Gravação ---
; Padrão: ST-Link via SWD (recomendado). Para gravar por DFU (USB, BOOT0 em alto),
; comente a linha abaixo e descomente 'upload_protocol = dfu'.
upload_protocol = stlink
; upload_protocol = dfu

; --- Serial monitor (USB CDC) ---
monitor_speed = 115200

; --- USB CDC (serial pela porta USB) ---
; Habilita a pilha USB do STM32duino como porta serial (Virtual COM).
; NOTA: no M0.5 vamos DESLIGAR isto e usar o USB da lib de FFB.
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED

; Se a placa não enumerar (USB não aparece), o mais provável é o cristal HSE:
; o default do genericSTM32F405RG assume 8 MHz. Se a ODESC usar outro valor,
; a USB (que precisa de 48 MHz exatos) não funciona. Nesse caso, definir o HSE
; correto (ex.: -D HSE_VALUE=8000000) e/ou ajustar o SystemClock. Ver README.
