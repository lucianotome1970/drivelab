; DriveLab Firmware — Trilho B
; Alvo: ODESC v4.2 (STM32F405RGT6). Framework Arduino (STM32duino).
; Dois ambientes: m0 (bring-up) e m05 (USB/FFB). Nenhum mexe no motor.
;
; Uso:
;   M0   : pio run -e m0  -t upload   (default)   -> serial hello
;   M0.5 : pio run -e m05 -t upload                -> enumerar como volante FFB

[platformio]
default_envs = m0

[env]
platform = ststm32
board = genericSTM32F405RG
framework = arduino
upload_protocol = stlink   ; alternativa: dfu (BOOT0 alto). Ver README.
monitor_speed = 115200

; ------------------------------------------------------------------
; M0 — bring-up: toolchain + gravação + serial USB (CDC do core). SEM motor.
; ------------------------------------------------------------------
[env:m0]
build_src_filter = +<m0/>
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED

; ------------------------------------------------------------------
; M0.5 v2 — USB/FFB via TinyUSB (substitui o shim USBLibrarySTM32, que nunca
;   chegou a enumerar no F405 — truncamento no descriptor). Passo A: só
;   prova a pilha TinyUSB com um joystick MÍNIMO (1 eixo + 1 botão), sem
;   PID/FFB ainda. SEM motor.
;   NOTA: aqui NÃO usamos USBD_USE_CDC — o USB passa a ser todo do TinyUSB.
; ------------------------------------------------------------------
[env:m05]
build_src_filter = +<m05/>
lib_deps = adafruit/Adafruit TinyUSB Library
build_flags =
    -D USBCON
    -D USE_TINYUSB
    -D HAL_PCD_MODULE_ENABLED
    -I ${PROJECT_DIR}/include

; ------------------------------------------------------------------
; M1 — motor open-loop: SimpleFOC + o cérebro (lib/brain) ligado por HAL. ESQUELETO — pinos e
;   tuning são da bancada (ODESC v4.2). Começa DESLIGADO por segurança; arma via serial ('1'/'0').
;   NÃO validado no hardware — este env prova que o cérebro + SimpleFOC integram e COMPILAM.
; ------------------------------------------------------------------
[env:m1]
build_src_filter = +<m1/>
lib_deps =
    https://github.com/simplefoc/Arduino-FOC.git
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED
    -I ${PROJECT_DIR}/lib/brain

; Gotcha de USB (todos os envs): o genericSTM32F405RG assume cristal HSE de 8 MHz.
; Se a ODESC usar outro, os 48 MHz da USB ficam errados e nada enumera. Nesse caso
; definir o HSE correto (ex.: -D HSE_VALUE=8000000) e/ou ajustar o SystemClock. Ver README.
