; DriveLab Firmware — Trilho B
; Alvo: ODESC v4.2 (STM32F405RGT6). Framework Arduino (STM32duino).
; Dois ambientes: m0 (bring-up) e m05 (USB/FFB). Nenhum mexe no motor.
;
; Uso:
;   M0   : pio run -e m0  -t upload   (default)   -> serial hello
;   M0.5 : pio run -e m05 -t upload                -> enumerar como volante FFB

[platformio]
default_envs = m0

[env]
platform = ststm32
board = genericSTM32F405RG
framework = arduino
upload_protocol = stlink   ; alternativa: dfu (BOOT0 alto). Ver README.
monitor_speed = 115200

; ------------------------------------------------------------------
; M0 — bring-up: toolchain + gravação + serial USB (CDC do core). SEM motor.
; ------------------------------------------------------------------
[env:m0]
build_src_filter = +<m0/>
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED

; ------------------------------------------------------------------
; M0.5 — USB/FFB: enumerar como volante DirectInput FFB (decisão B2).
;   Shim (Levi--G/USBLibrarySTM32) + cérebro FFB (YukMingLaw/ArduinoJoystickWithFFBLibrary).
;   RASCUNHO — escrito sem placa; esperar iteração na bancada. SEM motor.
;   NOTA: aqui NÃO usamos USBD_USE_CDC — o USB passa a ser o do shim (não coexistem).
; ------------------------------------------------------------------
[env:m05]
build_src_filter = +<m05/>
lib_deps =
    https://github.com/Levi--G/USBLibrarySTM32.git
    https://github.com/YukMingLaw/ArduinoJoystickWithFFBLibrary.git
build_flags =
    -D USBCON
    -D HAL_PCD_MODULE_ENABLED
    ; A JoystickWithFFB usa a macro AVR _delay_us() (de <util/delay.h>, inexistente no STM32).
    ; Mapeada para delayMicroseconds() via header force-included (ver include/avr_compat.h) —
    ; assim não editamos a lib (re-baixada pelo lib_deps) e evitamos escapar parênteses no -D.
    -include ${PROJECT_DIR}/include/avr_compat.h

; Gotcha de USB (ambos os envs): o genericSTM32F405RG assume cristal HSE de 8 MHz.
; Se a ODESC usar outro, os 48 MHz da USB ficam errados e nada enumera. Nesse caso
; definir o HSE correto (ex.: -D HSE_VALUE=8000000) e/ou ajustar o SystemClock. Ver README.
