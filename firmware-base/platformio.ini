; DriveLab Firmware — Trilho B
; Alvo: ODESC v4.2 (STM32F405RGT6). Framework Arduino (STM32duino).
; Dois ambientes: m0 (bring-up) e m05 (USB/FFB). Nenhum mexe no motor.
;
; Uso:
;   M0   : pio run -e m0  -t upload   (default)   -> serial hello
;   M0.5 : pio run -e m05 -t upload                -> enumerar como volante FFB

[platformio]
default_envs = m0

[env]
platform = ststm32
board = genericSTM32F405RG
framework = arduino
upload_protocol = stlink   ; alternativa: dfu (BOOT0 alto). Ver README.
monitor_speed = 115200

; ------------------------------------------------------------------
; M0 — bring-up: toolchain + gravação + serial USB (CDC do core). SEM motor.
; ------------------------------------------------------------------
[env:m0]
build_src_filter = +<m0/>
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED

; ------------------------------------------------------------------
; M0.5 v2 — USB/FFB via TinyUSB (substitui o shim USBLibrarySTM32, que nunca
;   chegou a enumerar no F405 — truncamento no descriptor). Passo A: só
;   prova a pilha TinyUSB com um joystick MÍNIMO (1 eixo + 1 botão), sem
;   PID/FFB ainda. SEM motor.
;   NOTA: aqui NÃO usamos USBD_USE_CDC — o USB passa a ser todo do TinyUSB.
; ------------------------------------------------------------------
[env:m05]
build_src_filter = +<m05/>
lib_deps = adafruit/Adafruit TinyUSB Library
build_flags =
    -D USBCON
    -D USE_TINYUSB
    -D HAL_PCD_MODULE_ENABLED
    -I ${PROJECT_DIR}/include
    ; Identidade USB definida em BUILD TIME (não em runtime): a lib Adafruit
    ; TinyUSB (arduino/Adafruit_USBD_Device.cpp, begin()) chama
    ; clearConfiguration() incondicionalmente, que reconstrói o device
    ; descriptor a partir destas macros — qualquer TinyUSBDevice.setID()/
    ; setProductDescriptor() chamado ANTES de begin() é descartado. É por
    ; isso que a v1 deste Passo A enumerou como 0x239A/0xCAFE "GENERIC_F405RGTX"
    ; (defaults da lib / ARDUINO_BOARD do core), mesmo chamando setID() no
    ; setup(). VID 0x1209 (pid.codes) / PID 0x0001 (DriveLab Base).
    -D USB_VID=0x1209
    -D USB_PID=0x0001
    '-D USB_MANUFACTURER="DriveLab"'
    '-D USB_PRODUCT="DriveLab Base"'

; ------------------------------------------------------------------
; M1 — motor open-loop: SimpleFOC + o cérebro (lib/brain) ligado por HAL. ESQUELETO — pinos e
;   tuning são da bancada (ODESC v4.2). Começa DESLIGADO por segurança; arma via serial ('1'/'0').
;   NÃO validado no hardware — este env prova que o cérebro + SimpleFOC integram e COMPILAM.
; ------------------------------------------------------------------
[env:m1]
build_src_filter = +<m1/>
lib_deps =
    https://github.com/simplefoc/Arduino-FOC.git
build_flags =
    -D USBCON
    -D USBD_USE_CDC
    -D HAL_PCD_MODULE_ENABLED
    -I ${PROJECT_DIR}/lib/brain

; ------------------------------------------------------------------
; M5 — motor real (ODrive v3.6 / MKS ODRIVE-S V3.6-S6V, 56V). Task 2: só
;   config do DRV8301 (SPI) + esqueleto SimpleFOC (driver 6-PWM, motor,
;   encoder) construídos mas SEM motor.init()/initFOC()/enable() — MOTOR
;   DESLIGADO. USB/FFB (m05) e o "cérebro" (lib/brain, m1) entram em tasks
;   futuras deste mesmo M5.
; ------------------------------------------------------------------
[env:m5]
build_src_filter = +<m5/>
lib_deps =
    https://github.com/simplefoc/Arduino-FOC.git
    adafruit/Adafruit TinyUSB Library
build_flags =
    -D USBCON
    -D USE_TINYUSB
    -D HAL_PCD_MODULE_ENABLED
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/lib/base_motor
    -I ${PROJECT_DIR}/lib/base_shared
    -I ${PROJECT_DIR}/lib/brain
    -D USB_VID=0x1209
    -D USB_PID=0x0001
    '-D USB_MANUFACTURER="DriveLab"'
    '-D USB_PRODUCT="DriveLab Base"'
    ; Arduino-FOC (SimpleFOCDebug.h) usa "&Serial" como default de parâmetro
    ; do enable() de debug -- e a macro `Serial` do Adafruit TinyUSB Library
    ; (redefinida para SerialTinyUSB neste core) entra em ciclo de
    ; auto-referência com QUALQUER uso textual de "Serial" (não só o nosso;
    ; até dentro do próprio header do SimpleFOC), o que quebra a compilação
    ; com "'Serial' was not declared in this scope". SIMPLEFOC_DISABLE_DEBUG
    ; remove esse default-argument (e toda a classe SimpleFOCDebug) da
    ; compilação -- não usamos esse recurso de debug no m5 mesmo assim (o
    ; log deste passo é feito via SerialTinyUSB.printf() direto no main.cpp).
    -D SIMPLEFOC_DISABLE_DEBUG

; Gotcha de USB (todos os envs): o genericSTM32F405RG assume cristal HSE de 8 MHz.
; Se a ODESC usar outro, os 48 MHz da USB ficam errados e nada enumera. Nesse caso
; definir o HSE correto (ex.: -D HSE_VALUE=8000000) e/ou ajustar o SystemClock. Ver README.
